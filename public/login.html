<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — V7</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b1730">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/pwa.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(ellipse 120% 60% at 50% -10%, #2b4a86 0%, #16294f 38%, #0c1730 65%, #060b1a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* ── Night sky: stars (twinkle + slow drifting parallax) ── */
    .stars-layer {
      position: fixed; top: -6%; left: -6%; width: 112%; height: 112%; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1.6px 1.6px at 8%  22%, #fff, transparent 60%),
        radial-gradient(1.2px 1.2px at 18% 48%, #fff, transparent 60%),
        radial-gradient(1.8px 1.8px at 27% 12%, #fff, transparent 60%),
        radial-gradient(1.1px 1.1px at 35% 65%, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 44% 30%, #fff, transparent 60%),
        radial-gradient(1.3px 1.3px at 52% 55%, #fff, transparent 60%),
        radial-gradient(1.7px 1.7px at 61% 18%, #fff, transparent 60%),
        radial-gradient(1.2px 1.2px at 69% 40%, #fff, transparent 60%),
        radial-gradient(1.6px 1.6px at 77% 60%, #fff, transparent 60%),
        radial-gradient(1.1px 1.1px at 84% 25%, #fff, transparent 60%),
        radial-gradient(1.9px 1.9px at 91% 48%, #fff, transparent 60%),
        radial-gradient(1.3px 1.3px at 96% 15%, #fff, transparent 60%),
        radial-gradient(1.4px 1.4px at 13% 78%, #fff, transparent 60%),
        radial-gradient(1.2px 1.2px at 58% 78%, #fff, transparent 60%),
        radial-gradient(1.5px 1.5px at 73% 82%, #fff, transparent 60%);
      opacity: 0.85;
      animation: starTwinkle 4s ease-in-out infinite alternate, starDrift 50s ease-in-out infinite;
    }
    .stars-layer.layer-2 {
      background-position: 40px 30px;
      opacity: 0.45;
      animation-duration: 6s, 36s;
      animation-delay: 1.5s, 0s;
      animation-name: starTwinkle, starDrift2;
    }
    @keyframes starTwinkle {
      0%,100% { opacity: 0.45; }
      50%     { opacity: 1;    }
    }
    @keyframes starDrift {
      0%,100% { transform: translate(0,0); }
      50%     { transform: translate(-26px, 16px); }
    }
    @keyframes starDrift2 {
      0%,100% { transform: translate(0,0); }
      50%     { transform: translate(20px, -12px); }
    }

    /* ── Moon — soft glow, gentle drift ── */
    .moon {
      position: fixed; top: 64px; right: 100px; z-index: 0; pointer-events: none;
      width: 72px; height: 72px; border-radius: 50%;
      background:
        radial-gradient(circle at 62% 68%, rgba(170,150,110,0.55) 0%, transparent 42%),
        radial-gradient(circle at 30% 55%, rgba(170,150,110,0.4)  0%, transparent 36%),
        radial-gradient(circle at 35% 30%, #fffaf0 0%, #f2e9cc 40%, #d9c9a0 72%, #b8a878 100%);
      animation: moonGlow 5s ease-in-out infinite, moonDrift 18s ease-in-out infinite;
    }
    @keyframes moonGlow {
      0%,100% { box-shadow: 0 0 40px 12px rgba(255,250,220,0.3),  0 0 80px 30px rgba(255,250,220,0.12); }
      50%     { box-shadow: 0 0 52px 16px rgba(255,250,220,0.45), 0 0 100px 40px rgba(255,250,220,0.2); }
    }
    @keyframes moonDrift {
      0%,100% { transform: translate(0,0); }
      50%     { transform: translate(-10px, 8px); }
    }

    /* ── Planes crossing the sky, blinking wingtip lights ── */
    .plane {
      position: fixed; top: 16%; left: -60px; z-index: 0; pointer-events: none;
      opacity: 0; animation: planeFly1 24s linear infinite; animation-delay: 3s;
    }
    .plane.p2 {
      top: 32%; animation-name: planeFly2; animation-duration: 30s; animation-delay: 14s;
    }
    .plane svg { width: 46px; height: 16px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35)); }
    .plane-light { animation: planeBlink 1s steps(2) infinite; }
    .plane-light-green { animation-delay: 0.5s; }
    @keyframes planeBlink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0.15; } }
    @keyframes planeFly1 {
      0%   { transform: translate(-60px, 0) rotate(-2deg);              opacity: 0; }
      6%   { opacity: 0.9; }
      92%  { opacity: 0.9; }
      100% { transform: translate(calc(100vw + 60px), -46px) rotate(-2deg); opacity: 0; }
    }
    @keyframes planeFly2 {
      0%   { transform: translate(calc(100vw + 60px), 0) rotate(180deg) rotate(3deg); opacity: 0; }
      6%   { opacity: 0.8; }
      92%  { opacity: 0.8; }
      100% { transform: translate(-60px, 34px) rotate(180deg) rotate(3deg);            opacity: 0; }
    }

    /* ── Shooting stars ── */
    .shooting-star {
      position: fixed; top: 10%; left: 78%;
      width: 140px; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
      transform: rotate(-35deg);
      opacity: 0; z-index: 0; pointer-events: none;
      animation: shootAcross 7s linear infinite;
    }
    .shooting-star.s2 { top: 26%; left: 45%; width: 110px; animation-duration: 9s;  animation-delay: 2.6s; }
    .shooting-star.s3 { top: 55%; left: 85%; width: 95px;  animation-duration: 10s; animation-delay: 5.2s; }
    @keyframes shootAcross {
      0%   { opacity: 0; transform: translate(0,0) rotate(-35deg); }
      4%   { opacity: 1; }
      15%  { opacity: 0; transform: translate(-280px,190px) rotate(-35deg); }
      100% { opacity: 0; }
    }

    /* ── City skyline silhouette ── */
    .skyline {
      position: fixed; left: 0; right: 0; bottom: 0; width: 100%; height: 190px;
      z-index: 0; pointer-events: none; opacity: 0.92;
    }
    .antenna-blink { animation: antennaBlink 2.4s ease-in-out infinite; }
    @keyframes antennaBlink { 0%,100% { opacity: 0.9; } 50% { opacity: 0.2; } }

    /* ── Top-left brand mark ── */
    .brand-chip {
      position: fixed; top: 22px; left: 26px; z-index: 3;
      display: flex; align-items: center; gap: 10px;
      animation: fadeItem 0.5s ease 0.1s both;
    }
    .brand-chip .chip-icon {
      width: 36px; height: 36px; border-radius: 11px;
      background: rgba(255,255,255,0.14); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .brand-chip .chip-icon img {
      width: 100%; height: 100%; object-fit: contain; border-radius: 11px;
    }
    .brand-chip .chip-text { color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.3px; }

    .login-wrap {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative; z-index: 1;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Soft moving white glow — sits only behind the card (z-index 0 vs card's 5) */
    .card-glow {
      position: absolute; top: -60px; left: 50%;
      width: 560px; height: 420px; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.55), transparent 70%);
      filter: blur(14px);
      animation: glowDrift 6s ease-in-out infinite;
    }
    @keyframes glowDrift {
      0%,100% { transform: translate(-50%, 0)      scale(1);    opacity: 0.5; }
      50%     { transform: translate(-46%, 26px)   scale(1.15); opacity: 0.85; }
    }

    /* Card — frosted glass */
    .card {
      width: 100%;
      background: linear-gradient(160deg, rgba(255,255,255,0.24), rgba(255,255,255,0.09));
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 26px;
      padding: 42px 38px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
      position: relative;
      z-index: 5;
      overflow: hidden;
    }

    .card-title {
      font-size: 27px; font-weight: 800; color: #0f1b3d;
      text-align: center; margin-bottom: 28px; letter-spacing: -0.5px;
    }

    /* Staggered reveal for card contents */
    .card > * { animation: fadeItem 0.5s ease both; }
    .card > *:nth-child(1)  { animation-delay: 0.06s; }
    .card > *:nth-child(2)  { animation-delay: 0.11s; }
    .card > *:nth-child(3)  { animation-delay: 0.16s; }
    .card > *:nth-child(4)  { animation-delay: 0.21s; }
    .card > *:nth-child(5)  { animation-delay: 0.26s; }
    .card > *:nth-child(6)  { animation-delay: 0.31s; }
    .card > *:nth-child(7)  { animation-delay: 0.36s; }
    @keyframes fadeItem {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Form — underline style */
    .form-group { margin-bottom: 22px; }
    .form-label {
      display: block; font-size: 13.5px; font-weight: 600;
      color: #1c2b4d; margin-bottom: 8px;
    }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon {
      position: absolute; right: 2px; display: flex; align-items: center;
      color: #1c2b4d; opacity: 0.7; pointer-events: none; transition: opacity 0.2s;
    }
    .input-icon svg { width: 18px; height: 18px; }
    .input-wrap:focus-within .input-icon { opacity: 1; }

    .input-icon-btn {
      position: absolute; right: 2px; display: flex; align-items: center;
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #1c2b4d; opacity: 0.7; transition: opacity 0.2s, transform 0.15s;
    }
    .input-icon-btn svg { width: 18px; height: 18px; }
    .input-icon-btn:hover { opacity: 1; transform: translateY(-1px); }

    .form-input {
      width: 100%; padding: 8px 30px 10px 2px;
      background: transparent; border: none; border-bottom: 1.5px solid rgba(28,43,77,0.28);
      font-size: 14.5px; font-family: inherit; color: #ffffff; outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: #ffffff; }
    .form-input::placeholder { color: rgba(28,43,77,0.45); }
    .form-input.input-error { border-bottom-color: #ef4444; }
    .field-error-msg {
      display: none; font-size: 11.5px; color: #ef4444; margin-top: 6px;
    }
    .field-error-msg.show { display: block; animation: alertIn 0.25s ease both; }

    /* Remember me / forgot password */
    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin: -8px 0 26px; font-size: 12.5px;
    }
    .remember-me { display: flex; align-items: center; gap: 7px; color: #33456e; cursor: pointer; user-select: none; }
    .remember-me input { accent-color: #1c2b4d; width: 14px; height: 14px; cursor: pointer; }
    .forgot-link { color: #1c2b4d; font-weight: 700; text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; }

    /* Submit button */
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #1c2b4d 0%, #0b1224 100%);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; margin-top: 2px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(6,10,24,0.45);
      letter-spacing: 0.2px;
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 9px;
    }
    .btn-login::after {
      content: ''; position: absolute; top: 0; left: -75%; width: 45%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      transition: left 0.65s ease;
    }
    .btn-login:hover:not(:disabled)::after { left: 130%; }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(6,10,24,0.55);
    }
    .btn-login:active:not(:disabled) { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.75; cursor: not-allowed; transform: none; }

    .btn-spinner {
      display: none; width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn-login.loading .btn-spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert */
    .alert {
      display: none; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; margin-top: 16px; border-left: 4px solid;
      line-height: 1.5;
      animation: alertIn 0.3s ease both;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert.success { display: block; background: rgba(240,253,244,0.9); color: #166534; border-color: #4ade80; }
    .alert.error   { display: block; background: rgba(254,242,242,0.9); color: #991b1b; border-color: #f87171; }
    .alert.info    { display: block; background: rgba(239,246,255,0.9); color: #1e40af; border-color: #60a5fa; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: rgba(28,43,77,0.45); font-size: 11.5px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(28,43,77,0.22);
    }

    /* Install App */
    .btn-install {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px;
      background: rgba(255,255,255,0.35); color: #1c2b4d;
      border: 1.5px solid rgba(28,43,77,0.35); border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-install:hover { background: rgba(255,255,255,0.55); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(10,15,30,0.18); }
    .btn-install:active { transform: scale(0.98); }
    .ios-install-hint {
      display: none; margin-top: 12px; font-size: 12px;
      color: rgba(28,43,77,0.7); text-align: center; line-height: 1.5;
    }

    /* Respect reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
      .stars-layer, .shooting-star, .plane { display: none; }
    }
  </style>
</head>
<body>

<div class="stars-layer"></div>
<div class="stars-layer layer-2"></div>
<div class="shooting-star"></div>
<div class="shooting-star s2"></div>
<div class="shooting-star s3"></div>

<!-- Moon -->
<div class="moon"></div>

<!-- Planes crossing the sky -->
<div class="plane">
  <svg viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 12 L40 10 L58 4 L54 10 L40 13 L18 16 L10 14 Z" fill="#e4ebf5"/>
    <circle class="plane-light plane-light-red"   cx="4"  cy="12" r="1.6" fill="#ff4d4d"/>
    <circle class="plane-light plane-light-green" cx="56" cy="5"  r="1.6" fill="#4dff9a"/>
  </svg>
</div>
<div class="plane p2">
  <svg viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 12 L40 10 L58 4 L54 10 L40 13 L18 16 L10 14 Z" fill="#e4ebf5"/>
    <circle class="plane-light plane-light-red"   cx="4"  cy="12" r="1.6" fill="#ff4d4d"/>
    <circle class="plane-light plane-light-green" cx="56" cy="5"  r="1.6" fill="#4dff9a"/>
  </svg>
</div>

<!-- City skyline silhouette -->
<svg class="skyline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 220" preserveAspectRatio="xMidYMax slice">
  <defs>
    <pattern id="winPattern" width="16" height="20" patternUnits="userSpaceOnUse">
      <rect width="16" height="20" fill="#0c1730"/>
      <rect x="3" y="4" width="4" height="5" fill="#ffd580" opacity="0.85"/>
      <rect x="10" y="10" width="4" height="5" fill="#ffd580" opacity="0.4"/>
    </pattern>
  </defs>
  <rect x="0"    y="120" width="120" height="100" fill="url(#winPattern)"/>
  <rect x="110"  y="150" width="90"  height="70"  fill="url(#winPattern)"/>
  <rect x="190"  y="90"  width="70"  height="130" fill="url(#winPattern)"/>
  <rect x="250"  y="140" width="110" height="80"  fill="url(#winPattern)"/>
  <rect x="350"  y="60"  width="60"  height="160" fill="url(#winPattern)"/>
  <rect x="400"  y="130" width="140" height="90"  fill="url(#winPattern)"/>
  <rect x="530"  y="100" width="80"  height="120" fill="url(#winPattern)"/>
  <rect x="600"  y="150" width="130" height="70"  fill="url(#winPattern)"/>
  <rect x="720"  y="80"  width="70"  height="140" fill="url(#winPattern)"/>
  <rect x="780"  y="140" width="150" height="80"  fill="url(#winPattern)"/>
  <rect x="920"  y="110" width="90"  height="110" fill="url(#winPattern)"/>
  <rect x="1000" y="150" width="130" height="70"  fill="url(#winPattern)"/>
  <rect x="1120" y="70"  width="80"  height="150" fill="url(#winPattern)"/>
  <rect x="1190" y="130" width="140" height="90"  fill="url(#winPattern)"/>
  <rect x="1320" y="100" width="100" height="120" fill="url(#winPattern)"/>
  <rect x="1410" y="145" width="120" height="75"  fill="url(#winPattern)"/>
  <rect x="1520" y="90"  width="80"  height="130" fill="url(#winPattern)"/>
  <!-- Antenna masts with blinking tips -->
  <line x1="385" y1="60" x2="385" y2="34" stroke="#b8c4dd" stroke-width="1.5"/>
  <circle class="antenna-blink" cx="385" cy="32" r="3" fill="#ff5a5a"/>
  <line x1="1160" y1="70" x2="1160" y2="42" stroke="#b8c4dd" stroke-width="1.5"/>
  <circle class="antenna-blink" cx="1160" cy="40" r="3" fill="#ff5a5a"/>
</svg>

<!-- Brand mark -->
<div class="brand-chip">
  <div class="chip-icon"><img src="/v7.jpeg" alt="V7 logo"></div>
  <div class="chip-text">V7</div>
</div>

<div class="login-wrap">

  <div class="card-glow"></div>

  <!-- Card -->
  <div class="card">
    <div class="card-title">Login</div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <input type="email" class="form-input" id="email"
               placeholder="you@example.com" autocomplete="email" oninput="clearFieldError('email')" />
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 6l-10 7L2 6"/><path d="M2 6h20v12H2z"/></svg>
        </span>
      </div>
      <div class="field-error-msg" id="email-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-input" id="password"
               placeholder="Enter your password" autocomplete="current-password"
               oninput="clearFieldError('password')"
               onkeydown="if(event.key==='Enter') doLogin()" />
        <button type="button" class="input-icon-btn" onclick="togglePwd()" tabindex="-1" id="eye-btn" title="Show/hide password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </button>
      </div>
      <div class="field-error-msg" id="password-error"></div>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" id="remember" />
        Remember me
      </label>
      <a class="forgot-link" href="/forgot-password">Forgot Password?</a>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-spinner"></span>
      <span class="btn-text">Login</span>
    </button>

    <div class="divider">or</div>

    <button type="button" class="btn-install js-install-app" onclick="installApp()">
      📲 Install App
    </button>
    <div class="ios-install-hint js-install-ios-hint">
      On iPhone: tap <strong>Share</strong> then <strong>Add to Home Screen</strong> to install.
    </div>

    <div class="alert" id="login-alert"></div>
  </div>

</div>

<script>
  function togglePwd() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function setFieldError(field, msg) {
    const input = document.getElementById(field);
    const errEl  = document.getElementById(`${field}-error`);
    input.classList.add('input-error');
    errEl.textContent = msg;
    errEl.classList.add('show');
  }

  function clearFieldError(field) {
    document.getElementById(field).classList.remove('input-error');
    const errEl = document.getElementById(`${field}-error`);
    errEl.classList.remove('show');
    errEl.textContent = '';
  }

  function clearAllFieldErrors() {
    clearFieldError('email');
    clearFieldError('password');
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const btnText  = btn.querySelector('.btn-text');
    const alertEl  = document.getElementById('login-alert');

    clearAllFieldErrors();

    if (!email || !password) {
      showAlert('error', 'Please enter your email and password.');
      if (!email)    setFieldError('email', 'Email is required');
      if (!password) setFieldError('password', 'Password is required');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');
    btnText.textContent = 'Signing in...';
    alertEl.className = 'alert'; alertEl.style.display = 'none';

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
        credentials: 'same-origin',
      });
      const data = await res.json();

      if (data.success) {
        showAlert('success', data.admin ? '✓ Welcome, admin! Redirecting...' : '✓ Welcome back! Redirecting...');
        setTimeout(() => {
          window.location.href = data.admin ? '/admin' : (isStandalone() ? '/replies' : '/');
        }, 900);
      } else {
        showAlert('error', data.error || 'Login failed');
        if (data.field) setFieldError(data.field, data.error);
        btn.disabled = false;
        btn.classList.remove('loading');
        btnText.textContent = 'Login';
      }
    } catch (e) {
      showAlert('error', 'Server error: ' + e.message);
      btn.disabled = false;
      btn.classList.remove('loading');
      btnText.textContent = 'Login';
    }
  }

  function showAlert(type, msg) {
    const el = document.getElementById('login-alert');
    el.className    = `alert ${type}`;
    el.textContent  = msg;
    el.style.display = 'block';
  }

  // Auto-focus email
  document.getElementById('email').focus();
</script>
</body>
</html>
